name: Jam Loceng Hugging Face (Full Squad)

on:
  schedule:
    # Jalan setiap 1 jam (Lebih selamat untuk logik Python)
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Bangunkan Semua Bot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          BOTS=(
            "https://pikeuli-weather-bot.hf.space"
            "https://pikeuli-berita-bot.hf.space"
            "https://pikeuli-waktu-solat.hf.space"
            "https://pikeuli-tengok-bulan.hf.space"
          )

          for URL in "${BOTS[@]}"; do
            echo "------------------------------------------"
            echo "⏰ Mengejutkan: $URL"
            
            # -L : Ikut redirect kalau HF tukar URL
            # -s : Silent mode
            # -i : Include headers (untuk debug status)
            # --max-time : Jangan tunggu lama sangat kalau bot hang
            STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $HF_TOKEN" \
              --max-time 30 \
              "$URL")
            
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ BERJAYA: Bot segar bugar (Status $STATUS)"
            elif [ "$STATUS" -eq 302 ] || [ "$STATUS" -eq 301 ]; then
              echo "ℹ️ INFO: Bot redirect (Status $STATUS) - Masih OK"
            elif [ "$STATUS" -eq 401 ] || [ "$STATUS" -eq 403 ]; then
              echo "🔑 AMARAN: Masalah Token/Permission (Status $STATUS)"
            else
              echo "❌ ERROR: Bot mungkin pengsan (Status $STATUS)"
            fi
          done
          echo "------------------------------------------"
          echo "✨ Proses Jam Loceng selesai!"
