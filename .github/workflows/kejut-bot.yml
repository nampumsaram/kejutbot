name: Jam Loceng Hugging Face (Full Squad)

on:
  schedule:
    # Jalan setiap 6 jam
    - cron: '0 */6 * * *'
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Bangunkan Semua Bot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Senarai URL Bot Kau
          # Nota: Nama Space dalam URL mesti huruf kecil
          BOTS=(
            "https://pikeuli-weather-bot.hf.space"
            "https://pikeuli-berita-bot.hf.space"
            "https://pikeuli-waktu-solat.hf.space"
            "https://pikeuli-tengok-bulan.hf.space"
          )

          for URL in "${BOTS[@]}"; do
            echo "------------------------------------------"
            echo "Sedang mengejutkan: $URL"
            
            # Kita hantar Token untuk semua. Public bot tak kisah, Private bot wajib ada.
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $HF_TOKEN" "$URL")
            
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 302 ]; then
              echo "✅ BERJAYA: Bot aktif (Status $STATUS)"
            else
              echo "⚠️ AMARAN: Bot bermasalah atau masih tidur (Status $STATUS)"
            fi
          done
          echo "------------------------------------------"
          echo "Semua bot telah diproses!"
